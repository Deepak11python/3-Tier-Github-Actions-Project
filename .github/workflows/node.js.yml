# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see:  https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted
    steps:
    - name: checkout node
      uses: actions/checkout@v4
    
    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: frontend compilation(syntax check)
      run: |
        cd client
        find . -name "*.js" -exec node --check {} +
    - name: backend compilation (syntax check)
      run: |
        cd api
        find . -name "*.js" -exec node --check {} +
  
  git-leaks-scan:
    runs-on: self-hosted
    needs: build
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Run GitLeaks Setup
      uses: gitleaks/gitleaks-action@v2
    - name: Gitleaks Scan
      run: |
        gitleaks detect --source ./client --verbose --redact --exit-code 1
        gitleaks detect --source ./api --verbose --redact --exit-code 1 
  
  trivy-scan:
    runs-on: self-hosted
    needs: git-leaks-scan 
    steps:
    - name: checkout node
      uses: actions/checkout@v4

    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@0.33.1
      with:
         scan-type: fs
         scan-ref: .
         format: table
         severity: HIGH,CRITICAL
         exit-code: 1
      
