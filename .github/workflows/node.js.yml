# This workflow will do a clean installation of node dependencies, cache/restore them,
# build the source code and run tests across different versions of node
# For more information see: 
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
# squ_09425f5ae82995b0bccda255f1ae990049ee02d6 

name: Node.js CICD

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: checkout node
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: frontend compilation(syntax check)
        run: |
          cd client
          find . -name "*.js" -exec node --check {} +

      - name: backend compilation (syntax check)
        run: |
          cd api
          find . -name "*.js" -exec node --check {} +

  git-leaks-scan:
    runs-on: self-hosted
    needs: build
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Run GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2

      - name: Gitleaks Scan
        run: |
          gitleaks detect --source ./client --verbose --redact --exit-code 1
          gitleaks detect --source ./api --verbose --redact --exit-code 1
     
      - name: Send Slack Notification
        if: always()
        run: |
         STATUS="${{ job.status }}"

         if [ "$STATUS" = "success" ]; then
          EMOJI="✅"
         else
          EMOJI="❌"
         fi

         curl -X POST -H 'Content-type: application/json' \
         --data "{
          \"text\":\"$EMOJI Pipeline $STATUS\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\nRUNID: ${{ github.run_id }}\"
          }"  \
         ${{ vars.SLACK_URL }}
        
  trivy-scan:
    runs-on: self-hosted
    needs: git-leaks-scan
    steps:
      - name: checkout node
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  Front-end-SonarQube-scan:
    runs-on: self-hosted
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: api
          args: >
            -Dsonar.projectKey=my-project
        env:
          SONAR_TOKEN: ${{ vars.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  Back-end-SonarQube-scan:
    runs-on: self-hosted
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: client
          args: >
            -Dsonar.projectKey=my-project
        env:
          SONAR_TOKEN: ${{ vars.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  Docker_build_frontend:
    runs-on: ubuntu-latest
    needs: Back-end-SonarQube-scan
    env:
      IMAGE_NAME: gitlab_demo_frontend
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER_NAME }}
          password: ${{ vars.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} ./api
          docker tag ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
  
  Docker_build_backend:
    runs-on: ubuntu-latest
    needs: Back-end-SonarQube-scan
    env:
      IMAGE_NAME: gitlab_demo_backend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER_NAME }}
          password: ${{ vars.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} ./client
          docker tag ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

  trivy-fe-image-scan:
   runs-on: self-hosted
   needs: Docker_build_backend
   env:
      IMAGE_NAME: gitlab_demo_frontend

   steps:
    - name: checkout node
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
          username: ${{ vars.DOCKER_USER_NAME }}
          password: ${{ vars.DOCKER_PASSWORD }}

    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@master
      with:
       scan-type: image
       image-ref: ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
       exit-code: 0
       scan-ref: .
       format: table
       severity: HIGH,CRITICAL
       vuln-type: os,library

  trivy-bk-image-scan:
    runs-on: self-hosted
    needs: Docker_build_backend
    env:
      IMAGE_NAME: gitlab_demo_backend

    steps:
     - name: checkout node
       uses: actions/checkout@v4

     - name: Login to Docker Hub
       uses: docker/login-action@v3
       with:
          username: ${{ vars.DOCKER_USER_NAME }}
          password: ${{ vars.DOCKER_PASSWORD }}

     - name: Run Trivy FS Scan
       uses: aquasecurity/trivy-action@master
       with:
        scan-type: image
        image-ref: ${{ vars.DOCKER_USER_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
        exit-code: 0
        scan-ref: .
        format: table
        severity: HIGH,CRITICAL
        vuln-type: os,library
      
  deploy_to_kubernetes:
    runs-on: self-hosted
    needs: trivy-bk-image-scan
    steps:
     - name: checkout node
       uses: actions/checkout@v4
    
     - name: Install AWS CLI if missing
       run: |
        if ! command -v aws >/dev/null 2>&1; then
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        sudo ./aws/install
        fi

     - name: Configure AWS Credentials
       uses: aws-actions/configure-aws-credentials@v4
       with:
        aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ vars.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        
     - name: Setup kubectl
       uses: azure/setup-kubectl@v4
       with:
        version: latest
     
     - name: Configure kubeconfig
       run: |
        mkdir -p $HOME/.kube 
        echo "${{ vars.EKS_KUBECONFIG}}" > $HOME/.kube/config
      
     - name: Deploy to EKS
       run: |
        kubectl apply -f k8s-prod/backend.yaml
        kubectl apply -f k8s-prod/ci.yaml
        kubectl apply -f k8s-prod/frontend.yaml
        kubectl apply -f k8s-prod/backend.yaml
        kubectl apply -f k8s-prod/ingress.yaml
        kubectl apply -f k8s-prod/mysql.yaml

  send_slack_notification:
    runs-on: self-hosted
    steps:
      - name: Send Slack Notification
       if: always()
       run: |
        STATUS="${{ job.status }}"

        if [ "$STATUS" = "success" ]; then
         EMOJI="✅"
        else
         EMOJI="❌"
        fi

        curl -X POST -H 'Content-type: application/json' \
        --data "{
        \"text\":\"$EMOJI Pipeline $STATUS\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\nRUNID: ${{ github.run_id }}\"
        }" \
        ${{ vars.SLACK_URL }}
